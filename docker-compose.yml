version: '3.8'

services:
  # Django Web Application
  web:
    build: .
    container_name: jarvis-web
    command: gunicorn projectsust.wsgi:application --bind 0.0.0.0:8000 --workers 4 --timeout 120
    environment:
      - DEBUG=False
      - SECRET_KEY=${SECRET_KEY:-django-insecure-development-key-change-in-production}
      - DATABASE_URL=postgresql://postgres:password@db:5432/jarvis_db
      - ALLOWED_HOSTS=localhost,127.0.0.1,web,jarvis-web
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SYNC_WITH_DJANGO=True
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
      - ./logs:/app/logs
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: jarvis-db
    environment:
      - POSTGRES_DB=jarvis_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: jarvis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jarvis-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Optional, for production)
  nginx:
    image: nginx:alpine
    container_name: jarvis-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./media:/app/media:ro
    depends_on:
      - web
    networks:
      - jarvis-network
    profiles:
      - "production"

volumes:
  postgres_data:
  redis_data:

networks:
  jarvis-network:
    driver: bridge

# Usage:
# Development:
#   docker-compose up -d
#
# With production services:
#   docker-compose --profile production up -d
#
# View logs:
#   docker-compose logs -f web
#
# Run migrations:
#   docker-compose exec web python manage.py migrate
#
# Create superuser:
#   docker-compose exec web python manage.py createsuperuser
#
# Access:
#   http://localhost:8000 (with web service only)
#   http://localhost (with nginx service)
